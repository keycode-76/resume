<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dollar Base</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #ccc;
    font-family: 'DM Sans', sans-serif;
    height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ─── SCREENS ─── */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    transition: opacity 0.4s, transform 0.4s;
  }

  .screen.hidden {
    opacity: 0;
    pointer-events: none;
    transform: scale(0.96);
  }


  /* ─── SCREEN 1: HERO ─── */
  #s1 {
    padding-top: 80px;
  }

  #s1 h1 {
    font-size: 25px;
    font-weight: 700;
    color: #000000;
    text-align: center;
    line-height: 1.3;
    margin-bottom: 20px;
  }
  #s1 h2 {
    font-size: 18px;
    color: #a3a3a3;
    margin-bottom: 10px;
    font-weight: 300;
  }

  #s1 .button-container {
    display: flex;
    align-items: center;
    gap: 12px;
    justify-content: center;
  }

  .email-input-wrapper {
    position: relative;
    width: 0;
    opacity: 0;
    transition: width 0.3s, opacity 0.3s;
    pointer-events: none;
    overflow: hidden;
    max-width: calc(100% - 48px); /* 確保不會被截掉 */
    margin: 0 auto;
  }

  .email-input-wrapper.show {
    width: 100%;
    max-width: 320px; /* 縮小最大寬度 */
    opacity: 1;
    pointer-events: all;
  }

  .email-input-wrapper input {
    width: 100%;
    padding: 12px 100px 12px 20px; /* 右側留空間給按鈕 */
    border: 1.5px solid #DDD;
    border-radius: 25px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; /* 稍微縮小字體 */
    background: white;
    color: #1A1A1A;
    outline: none;
    transition: border-color 0.15s;
    box-sizing: border-box;
  }

  .email-input-wrapper input:focus { 
    
  }
  
  .email-input-wrapper input::placeholder { 
    color: #CCC; 
  }

  .email-input-wrapper .inline-btn {
    position: absolute;
    right: 4px;
    top: 50%;
    transform: translateY(-50%);
    background: #1A1A1A;
    color: white;
    border: none;
    padding: 8px 18px;
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }

  .email-input-wrapper .inline-btn:hover { 
    opacity: 0.85; 
  }
  
  .email-input-wrapper .inline-btn:active { 
    transform: translateY(-50%) scale(0.98); 
  }

  .big-btn {
    background: #1A1A1A;
    color: white;
    border: none;
    padding: 10px 30px;
    border-radius: 100px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
    letter-spacing: 0.3px;
    flex-shrink: 0;
  }

  .big-btn:hover { opacity: 0.85; transform: translateY(-2px); }
  .big-btn:active { transform: scale(0.98); }

  /* 當 email 輸入框顯示時，隱藏外部的 Subscribe 按鈕 */
  .email-input-wrapper.show ~ .big-btn {
    display: none;
  }


  /* ─── SCREEN 2: SWIPE ─── */
  #s2 {
    padding: 0;
    padding-top: 80px;
    padding-bottom: 40px; /* 為 hint-row 留出空間 */
    justify-content: center; /* 卡片垂直居中 */
    align-items: center;
    position: relative;
  }

  /* CARD STACK */
  .card-stack {
    position: relative;
    width: 320px;
    height: 420px;
    margin-top: -60px; /* 往上移動卡片，為 hint-row 留出空間 */
  }

  .card {
    position: absolute;
    inset: 0;
    border-radius: 24px;
    padding: 36px 32px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    cursor: grab;
    user-select: none;
    transition: transform 0.08s;
    touch-action: none;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    background: #FFFFFF; /* 確保默認背景色 */
  }

  .card:active { cursor: grabbing; }

  .card-emoji {
    font-size: 64px;
    position: absolute;
    top: 36px;
    left: 32px;
  }

  .card-image {
    position: absolute;
    top: 36px;
    left: 32px;
    width: 64px;
    height: 64px;
    object-fit: contain;
  }

  /* Who is Human special image style */
  .card-image-full {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 60%;
    object-fit: cover;
    border-radius: 24px 24px 0 0;
    z-index: 1; /* 圖片在底層 */
  }

  .card.has-full-image {
    padding: 0;
    overflow: hidden;
    background: #FFFFFF !important; /* 確保背景色 */
  }

  .card.has-full-image .card-content {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 3;
    padding: 36px 32px;
    background: #FFFFFF;
  }

  .card-tag {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.6;
    margin-bottom: 8px;
  }

  .card-title {
    font-size: 24px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 10px;
  }

  .card-body {
    font-size: 14px;
    line-height: 1.6;
    opacity: 0.75;
  }

  /* SWIPE LABELS */
  .label-like, .label-nope {
    position: absolute;
    top: 40px;
    font-size: 22px;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 8px;
    border: 3px solid;
    opacity: 0;
    transition: opacity 0.1s;
    pointer-events: none;
    letter-spacing: 2px;
    z-index: 100; /* 確保標籤在最上方，不被圖片遮住 */
  }

  .label-like {
    right: 24px;
    color: #2ECC71;
    border-color: #2ECC71;
    transform: rotate(8deg);
  }

  .label-nope {
    left: 24px;
    color: #E74C3C;
    border-color: #E74C3C;
    transform: rotate(-8deg);
  }

  /* HINT ROW */
  .hint-row {
    position: absolute;
    top: calc(50% + 210px + 30px); /* 卡片中心 (50%) + 卡片高度的一半 (210px) + 30px 間距 */
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 24px;
    align-items: center;
    z-index: 5; /* 確保在卡片上方 */
    width: 100%;
    justify-content: center;
  }

  .hint-btn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 2px solid #DDD;
    background: white;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, border-color 0.15s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  .hint-btn:hover { transform: scale(1.1); }
  .hint-btn.left:hover { border-color: #E74C3C; }
  .hint-btn.right:hover { border-color: #2ECC71; }

  .hint-center {
    font-size: 11px;
    color: #666666;
    text-align: start;
    letter-spacing: 1px;
    line-height: 1.8;
  }

  /* COUNTER */
  .counter {
    position: absolute;
    top: 32px;
    right: 24px;
    font-size: 12px;
    color: #BBB;
  }

  /* DONE STATE - ABOUT ME */
  .done-state {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    text-align: center;
    padding: 80px 32px 80px;
    max-width: 500px;
    width: 100%;
    overflow-y: auto;
    max-height: 100vh;
    scroll-padding-bottom: 20px; /* 確保滾動時按鈕可見 */
  }
  
  /* RWD: 在小螢幕上調整 padding */
  @media (max-height: 800px) {
    .done-state {
      padding: 40px 24px 60px;
    }
  }
  
  @media (max-height: 600px) {
    .done-state {
      padding: 32px 24px 50px;
    }
  }
  
  /* RWD: 在窄螢幕上調整 padding */
  @media (max-width: 480px) {
    .done-state {
      padding: 60px 24px 60px;
    }
  }

  /* Custom Scrollbar */
  .done-state::-webkit-scrollbar {
    width: 8px;
  }

  .done-state::-webkit-scrollbar-track {
    background: #ccc;
  }

  .done-state::-webkit-scrollbar-thumb {
    background: #999;
    border-radius: 4px;
  }

  .done-state::-webkit-scrollbar-thumb:hover {
    background: #777;
  }

  /* Firefox scrollbar */
  .done-state {
    scrollbar-width: thin;
    scrollbar-color: #999 #ccc;
  }

  .done-state.show { display: flex; }

  /* 動畫：初始狀態隱藏（只在沒有 show 類時） */
  .done-state:not(.show) .done-avatar,
  .done-state:not(.show) .done-intro,
  .done-state:not(.show) .done-section,
  .done-state:not(.show) .replay-btn,
  .done-state:not(.show) .done-product-item {
    opacity: 0;
    transform: translateY(20px);
    will-change: opacity, transform;
  }

  /* 頭像動畫 */
  .done-state.show .done-avatar {
    animation: avatarAppear 0.6s ease-out forwards;
  }

  @keyframes avatarAppear {
    0% {
      opacity: 0;
      transform: scale(0.8) translateY(20px);
    }
    50% {
      transform: scale(1.05) translateY(0);
    }
    100% {
      opacity: 1;
      transform: scale(1) translateY(0);
    }
  }

  /* 介紹文字動畫 - 確保動畫開始前保持隱藏 */
  .done-state.show .done-intro {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 0.5s ease-out 0.3s forwards;
  }

  /* Connect 區域動畫 - 確保動畫開始前保持隱藏 */
  .done-state.show .done-section:nth-of-type(1) {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 0.5s ease-out 0.5s forwards;
  }

  /* Categories 區域動畫 - 確保動畫開始前保持隱藏 */
  .done-state.show .done-section:nth-of-type(2) {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 0.5s ease-out 0.7s forwards;
  }

  /* 產品列表動畫 - 確保動畫開始前保持隱藏 */
  .done-state.show .done-section:nth-of-type(3) {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 0.5s ease-out 0.9s forwards;
  }

  /* 產品項目依次出現 - 確保動畫開始前保持隱藏 */
  .done-state.show .done-product-item {
    opacity: 0;
    transform: translateY(15px);
  }

  .done-state.show .done-product-item:nth-child(1) {
    animation: fadeInUp 0.4s ease-out 1.0s forwards;
  }

  .done-state.show .done-product-item:nth-child(2) {
    animation: fadeInUp 0.4s ease-out 1.15s forwards;
  }

  .done-state.show .done-product-item:nth-child(3) {
    animation: fadeInUp 0.4s ease-out 1.3s forwards;
  }

  .done-state.show .done-product-item:nth-child(4) {
    animation: fadeInUp 0.4s ease-out 1.45s forwards;
  }

  .done-state.show .done-product-item:nth-child(5) {
    animation: fadeInUp 0.4s ease-out 1.6s forwards;
  }

  /* 按鈕動畫 - 確保動畫開始前保持隱藏 */
  .done-state.show .replay-btn {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 0.5s ease-out 1.75s forwards;
  }

  @keyframes fadeInUp {
    0% {
      opacity: 0;
      transform: translateY(20px);
    }
    100% {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .done-avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #DDD;
  }

  .done-intro {
    font-size: 16px;
    color: #1A1A1A;
    line-height: 1.7;
    text-align: left;
    /* background: rgb(221, 221, 221); */
    padding: 24px;
    border-radius: 10px;
    border: 1.5px solid #DDD;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
  }

  .done-intro a {
    color: #1A1A1A;
    text-decoration: none;
  }
  .done-intro p {
    font-size: 14px;
    color: #464646;
    text-decoration: none;
  }

  .done-intro a:hover {
    text-decoration: underline;
  }

  .done-section {
    width: 100%;
    text-align: left;
  }

  .done-section h3 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 16px;
    text-align: center;
  }

  .done-social-links {
    display: flex;
    gap: 12px;
    flex-wrap: nowrap;
    justify-content: center;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  
  /* RWD: 在小螢幕上允許水平滾動 */
  @media (max-width: 600px) {
    .done-social-links {
      justify-content: flex-start;
      padding-bottom: 4px;
    }
    
    .done-social-links::-webkit-scrollbar {
      height: 4px;
    }
    
    .done-social-links::-webkit-scrollbar-track {
      background: transparent;
    }
    
    .done-social-links::-webkit-scrollbar-thumb {
      background: #999;
      border-radius: 2px;
    }
  }

  .done-social-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 15px;
    border: 1.5px solid #DDD;
    border-radius: 100px;
    text-decoration: none;
    color: #1A1A1A;
    font-size: 12px;
    font-weight: 500;
    background: white;
    transition: border-color 0.15s, background 0.15s;
  }

  .done-social-link:hover {
    background: #000000;
    color: #cccccc;
  }

  .done-category-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .done-category-tag {
    padding: 8px 16px;
    background: white;
    border: 1.5px solid #DDD;
    border-radius: 100px;
    font-size: 13px;
    color: #1A1A1A;
    font-weight: 500;
  }

  .done-products {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-top: 8px;
  }

  .done-product-item {
    padding: 16px;
    background: white;
    border: 1.5px solid #DDD;
    border-radius: 12px;
    text-align: left;
    transition: border-color 0.15s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }

  .done-product-item:hover {
    border-color: #1A1A1A;
    transform: translateY(-2px);
  }

  .done-product-item a {
    text-decoration: none;
    color: #1A1A1A;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    z-index: 2;
  }

  .done-product-item img {
    width: 48px;
    height: 48px;
    object-fit: contain;
    flex-shrink: 0;
  }

  /* Who is Human 左側圖片樣式 */
  .done-product-item.who-is-human {
    padding: 0;
    overflow: hidden;
  }

  .done-product-item.who-is-human a {
    display: flex;
    align-items: center;
    gap: 0;
    position: relative;
    height: 80px;
  }

  .done-product-item.who-is-human img {
    width: 33.33%;
    height: 100%;
    object-fit: cover;
    flex-shrink: 0;
    position: relative;
  }

  .done-product-item.who-is-human .done-product-info {
    flex: 1;
    padding: 16px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 2;
    height: 80px;
    box-sizing: border-box;
  }

  .done-product-info {
    flex: 1;
  }

  .done-product-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .done-product-desc {
    font-size: 13px;
    color: #888;
    line-height: 1.4;
  }

  .replay-btn {
    margin-top: 8px;
    margin-bottom: 0;
    background: none;
    border: 1.5px solid #1A1A1A;
    color: #1A1A1A;
    padding: 14px 36px;
    border-radius: 100px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0; /* 確保按鈕不會被壓縮 */
  }
  
  /* RWD: 在小螢幕上調整按鈕大小 */
  @media (max-width: 480px) {
    .replay-btn {
      padding: 12px 28px;
      font-size: 13px;
    }
  }

  .replay-btn:hover { background: #1A1A1A; color: white; }

  /* Progress dots */
  .dots {
    position: absolute;
    top: 100px;
    display: flex;
    gap: 6px;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #DDD;
    transition: background 0.2s;
  }

  .dot.done { background: #1A1A1A; }

</style>
</head>
<body>

<!-- ─── SCREEN 1: HERO ─── -->
<div class="screen" id="s1">
  <h2>Lets Connect</h2>
  <h1>Hi, I'm 404 Chen</h1>
  <div class="button-container">
    <div class="email-input-wrapper" id="email-wrapper">
      <input type="email" id="email-input" placeholder="EMAIL" />
      <button class="inline-btn" id="continue-btn" onclick="toggleEmail()" style="display: none;">Start</button>
    </div>
    <button class="big-btn" id="subscribe-btn" onclick="toggleEmail()">Email</button>
  </div>
</div>

<!-- ─── SCREEN 2: SWIPE ─── -->
<div class="screen hidden" id="s2">
  <div class="dots" id="dots"></div>
  <div class="counter" id="counter"></div>

  <div class="card-stack" id="card-stack">
    <!-- cards injected by JS -->
  </div>

  <!-- About Me content will be loaded dynamically from about.html -->
  <div class="done-state" id="done-state">
    <!-- Content loaded from about.html -->
  </div>

  <div class="hint-row" id="hint-row">
    <button class="hint-btn left" onclick="swipeCard(-1)">✕</button>
    <div class="hint-center">Swipe Left Skip<br>
      Swipe Right Save<br>
      Swipe Up Explore</div>
    <button class="hint-btn right" onclick="swipeCard(1)">♥</button>
  </div>
</div>


<script>
// Google Sheets Configuration
const GOOGLE_SHEETS_CONFIG = {
  WEB_APP_URL: 'https://script.google.com/macros/s/AKfycbyjb-mXodwiqCsyagxV0-cGFBfHZuVSINBT5RCES3OtPwQA7K7DVvMnIdjwugbE_VsQMw/exec'
};

const CARDS = [
  {
    bg: '#FFF0E6',
    color: '#1A1A1A',
    image: 'assets/image/screenshot_whoishuman.png',
    tag: 'Game',
    title: 'Who is\nHuman?',
    body: 'A social deduction game — can you tell the difference between human and AI? Join early and get notified at launch.',
    link: '#',
    source: 'who_is_human'
  },
  {
    bg: '#E8F5E9',
    color: '#1A1A1A',
    image: 'assets/image/screenshot_challog2.0.png',
    tag: 'App',
    title: 'Challog',
    body: 'A challenge tracker to build your streaks and achieve your goals.',
    link: 'https://play.google.com/store/apps/details?id=com.challog.app',
    source: 'challog'
  },
  {
    bg: '#EEF2FF',
    color: '#1A1A1A',
    image: 'assets/image/02_sushishots.png',
    tag: 'App',
    title: 'Sushi Shots',
    body: 'Clean App screenshots in under 5 min. Make your app look professional.',
    link: 'https://sushishots.dollarbasellc.com/',
    source: 'sushi_shots'
  },
];

let stack = [];
let currentIdx = 0;
let isDragging = false;
let startX = 0, startY = 0, currentX = 0, currentY = 0;
let activeCard = null;
let userEmail = '';
let swipedSources = []; // Track sources of right-swiped cards

function toggleEmail() {
  const emailWrapper = document.getElementById('email-wrapper');
  const subscribeBtn = document.getElementById('subscribe-btn');
  const continueBtn = document.getElementById('continue-btn');
  
  if (emailWrapper.classList.contains('show')) {
    // If email input is shown, proceed to swipe
    const email = document.getElementById('email-input').value.trim();
    if (email && email.includes('@')) {
      // Email is valid, save it
      userEmail = email;
      // 保存 email
      saveEmailToSheets(email, '', null); // 傳遞 null 作為 callback
      goTo(2);
    } else {
      // Email is empty or invalid, prevent proceeding
      const emailInput = document.getElementById('email-input');
      emailInput.style.borderColor = '#E74C3C';
      emailInput.placeholder = 'Please enter a valid email';
      setTimeout(() => {
        emailInput.style.borderColor = '#DDD';
        emailInput.placeholder = 'EMAIL';
      }, 2000);
      return false; // 阻止繼續
    }
  } else {
    // Show email input
    emailWrapper.classList.add('show');
    subscribeBtn.style.display = 'none'; // 隱藏外部按鈕
    if (continueBtn) {
      continueBtn.style.display = 'block'; // 顯示內部按鈕
    }
    setTimeout(() => {
      document.getElementById('email-input').focus();
    }, 300);
  }
}

function saveEmailToSheets(email, source, callback) {
  // 確保 callback 有默認值
  callback = callback || null;
  
  if (!GOOGLE_SHEETS_CONFIG.WEB_APP_URL) {
    console.error('Google Sheets URL 未配置');
    if (callback && typeof callback === 'function') {
      callback();
    }
    return;
  }
  
  // 調試：顯示保存的詳細信息
  console.log('=== 保存到 Google Sheets ===');
  console.log('Email:', email);
  console.log('Source:', source);
  console.log('Timestamp:', new Date().toISOString());
  
  const timestamp = new Date().toISOString();
  const iframeId = 'google-sheets-submit-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
  let callbackExecuted = false;
  
  // 將 callback 保存在閉包中
  const savedCallback = callback;
  
  const executeCallback = function() {
    if (callbackExecuted) return;
    callbackExecuted = true;
    
    const iframe = document.getElementById(iframeId);
    const form = document.getElementById('form-' + iframeId);
    if (iframe && document.body.contains(iframe)) {
      document.body.removeChild(iframe);
    }
    if (form && document.body.contains(form)) {
      document.body.removeChild(form);
    }
    
    // 執行回調
    if (savedCallback && typeof savedCallback === 'function') {
      savedCallback();
    }
  };
  
  const messageHandler = function(event) {
    if (!event.data || typeof event.data !== 'object') return;
    
    window.removeEventListener('message', messageHandler);
    executeCallback();
  };
  
  window.addEventListener('message', messageHandler);

  const iframe = document.createElement('iframe');
  iframe.id = iframeId;
  iframe.style.display = 'none';
  iframe.name = iframeId;
  document.body.appendChild(iframe);

  const form = document.createElement('form');
  form.id = 'form-' + iframeId;
  form.method = 'POST';
  form.action = GOOGLE_SHEETS_CONFIG.WEB_APP_URL;
  form.target = iframeId;
  form.enctype = 'application/x-www-form-urlencoded';
  form.style.display = 'none';

  const emailInput = document.createElement('input');
  emailInput.type = 'hidden';
  emailInput.name = 'email';
  emailInput.value = email;
  form.appendChild(emailInput);

  const sourceInput = document.createElement('input');
  sourceInput.type = 'hidden';
  sourceInput.name = 'source';
  sourceInput.value = source;
  form.appendChild(sourceInput);
  
  // 調試：確認表單數據
  console.log('表單數據:', {
    email: email,
    source: source,
    timestamp: timestamp
  });

  const timestampInput = document.createElement('input');
  timestampInput.type = 'hidden';
  timestampInput.name = 'timestamp';
  timestampInput.value = timestamp;
  form.appendChild(timestampInput);

  document.body.appendChild(form);
  
  // 調試：確認表單提交
  console.log('提交表單到:', GOOGLE_SHEETS_CONFIG.WEB_APP_URL);
  form.submit();
  console.log('表單已提交');

  // 設置超時回調（如果沒有收到 postMessage，2秒後執行回調）
  setTimeout(() => {
    window.removeEventListener('message', messageHandler);
    executeCallback();
  }, 2000); // 2 秒超時
}

// 用於追蹤提交狀態，避免同時提交多個表單
let isSubmitting = false;
let pendingSources = [];

function saveSwipeToSheets(source) {
  // 如果沒有 userEmail，嘗試從 localStorage 獲取或使用匿名標識
  const email = userEmail || localStorage.getItem('userEmail') || 'anonymous_' + Date.now();
  if (!source) return;
  
  // 調試：顯示即將保存的資料
  console.log('保存到 Google Sheets:');
  console.log('  Email:', email);
  console.log('  Source:', source);
  console.log('  當前 swipedSources 陣列:', swipedSources);
  
  // 如果 userEmail 為空，保存到 localStorage 以便後續使用
  if (!userEmail) {
    localStorage.setItem('userEmail', email);
    userEmail = email;
  }
  
  // 如果正在提交，將 source 加入待處理列表
  if (isSubmitting) {
    pendingSources.push(source);
    console.log('表單正在提交中，將 source 加入待處理列表:', pendingSources);
    return;
  }
  
  // 設置提交狀態
  isSubmitting = true;
  
  // 右滑時保存對應的 source
  // 如果三個都右滑，會分別保存：
  // 1. source: 'who_is_human' (第一個卡片)
  // 2. source: 'challog' (第二個卡片)
  // 3. source: 'sushi_shots' (第三個卡片)
  saveEmailToSheets(email, source, () => {
    // 提交完成後的回調
    isSubmitting = false;
    
    // 處理待處理的 source
    if (pendingSources.length > 0) {
      const nextSource = pendingSources.shift();
      console.log('處理待處理的 source:', nextSource);
      setTimeout(() => {
        saveSwipeToSheets(nextSource);
      }, 500); // 延遲 500ms 再提交下一個
    }
  });
}

function goTo(n) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.add('hidden');
    s.classList.remove('show');
  });
  document.getElementById('s' + n).classList.remove('hidden');
  if (n === 2) {
    initSwipe();
  }
}

function replay() {
  console.log('replay() called');
  currentIdx = 0;
  swipedSources = []; // Reset swiped sources for new session
  // 清除 URL hash
  if (window.location.hash === '#about' || window.location.hash === '#swipe') {
    window.history.replaceState(null, '', window.location.pathname);
  }
  // 確保在 screen 2 (swipe 頁面)
  goTo(2);
}

function initSwipe() {
  currentIdx = 0;
  stack = [];
  const cs = document.getElementById('card-stack');
  cs.innerHTML = '';
  const doneState = document.getElementById('done-state');
  
  // 重置 done-state 的狀態
  doneState.classList.remove('show');
  doneState.style.display = 'none';
  doneState.style.opacity = '';
  doneState.style.transform = '';
  
  // 清除所有子元素的動畫狀態，避免 UI 跑位
  const children = doneState.querySelectorAll('.done-avatar, .done-intro, .done-section, .replay-btn, .done-product-item');
  children.forEach(child => {
    child.style.opacity = '';
    child.style.transform = '';
    child.style.animation = '';
    child.style.willChange = '';
  });
  
  // 強制重排，確保狀態重置
  void doneState.offsetWidth;
  
  // 重置其他 UI 元素
  const hintRow = document.getElementById('hint-row');
  const cardStack = document.getElementById('card-stack');
  hintRow.style.display = 'flex';
  cardStack.style.display = 'block';
  hintRow.style.opacity = '';
  hintRow.style.transform = '';
  cardStack.style.opacity = '';
  cardStack.style.transform = '';

  // Build dots
  const dots = document.getElementById('dots');
  dots.innerHTML = CARDS.map((_, i) => `<div class="dot" id="dot-${i}"></div>`).join('');

  // Create cards (bottom to top)
  CARDS.slice().reverse().forEach((data, ri) => {
    const i = CARDS.length - 1 - ri;
    const card = createCard(data, i);
    cs.appendChild(card);
    stack.push(card);
    
    // 調試：確認卡片已創建
    console.log(`卡片 ${i} 已創建:`, {
      title: data.title,
      image: data.image,
      hasFullImage: card.classList.contains('has-full-image')
    });
  });

  stack.reverse(); // stack[0] = top card
  updateStack();
  updateCounter();
  
  // 調試：確認卡片堆疊狀態
  console.log('卡片堆疊初始化完成，總數:', stack.length);
}

function createCard(data, idx) {
  const card = document.createElement('div');
  card.className = 'card';
  card.style.background = '#FFFFFF'; // 所有卡片底色都是白色
  card.style.color = data.color;
  card.dataset.idx = idx;
  card.dataset.link = data.link;
  card.dataset.source = data.source || '';
  
  // 調試：顯示卡片創建時的 source
  console.log(`創建卡片 ${idx}:`, {
    title: data.title,
    source: data.source,
    link: data.link
  });

  // 檢查是否為 Who is Human 或 Challog（使用 source 或 title 判斷）
  const isWhoIsHuman = data.source === 'who_is_human' || data.title.includes('Who is');
  const isChallog = data.source === 'challog' || data.title.includes('Challog');
  const useFullImage = isWhoIsHuman || isChallog;
  
  let imageOrEmoji;
  if (data.image) {
    if (useFullImage) {
      // Who is Human 和 Challog: 圖片占滿上方
      imageOrEmoji = `
        <img src="${data.image}" alt="${data.title}" class="card-image-full">
      `;
      card.classList.add('has-full-image');
    } else {
      // 其他卡片: 小圖標
      imageOrEmoji = `<img src="${data.image}" alt="${data.title}" class="card-image">`;
    }
  } else {
    imageOrEmoji = `<div class="card-emoji">${data.emoji || '📱'}</div>`;
  }

  const contentHTML = useFullImage 
    ? `<div class="card-content">
        <div class="card-tag">${data.tag}</div>
        <div class="card-title">${data.title.replace('\n','<br>')}</div>
        <div class="card-body">${data.body}</div>
      </div>`
    : `
      <div class="card-tag">${data.tag}</div>
      <div class="card-title">${data.title.replace('\n','<br>')}</div>
      <div class="card-body">${data.body}</div>
    `;

  card.innerHTML = `
    <div class="label-like" id="like-${idx}">SAVE</div>
    <div class="label-nope" id="nope-${idx}">SKIP</div>
    ${imageOrEmoji}
    ${contentHTML}
  `;

  // 添加圖片錯誤處理
  if (data.image && useFullImage) {
    const img = card.querySelector('.card-image-full');
    if (img) {
      img.addEventListener('error', function() {
        console.error('圖片加載失敗:', data.image);
        // 圖片加載失敗時，移除全圖樣式，改為小圖標樣式
        card.classList.remove('has-full-image');
        img.className = 'card-image';
        img.style.width = '64px';
        img.style.height = '64px';
        img.style.position = 'absolute';
        img.style.top = '36px';
        img.style.left = '32px';
        img.style.objectFit = 'contain';
        
        // 移動內容到正常位置
        const content = card.querySelector('.card-content');
        if (content) {
          content.style.position = 'static';
          content.style.background = 'transparent';
          content.style.padding = '0';
        }
      });
    }
  }

  // Drag events
  card.addEventListener('mousedown', dragStart);
  card.addEventListener('touchstart', dragStart, { passive: true });

  return card;
}

function updateStack() {
  const remaining = stack.slice(currentIdx);
  remaining.forEach((card, i) => {
    if (i === 0) {
      card.style.transform = 'translateY(0) scale(1)';
      card.style.zIndex = 10;
      card.style.opacity = '1';
    } else if (i === 1) {
      card.style.transform = 'translateY(12px) scale(0.96)';
      card.style.zIndex = 9;
      card.style.opacity = '1';
    } else if (i === 2) {
      card.style.transform = 'translateY(24px) scale(0.92)';
      card.style.zIndex = 8;
      card.style.opacity = '0.7';
    } else {
      card.style.transform = 'translateY(36px) scale(0.88)';
      card.style.zIndex = 7;
      card.style.opacity = '0';
    }
    card.style.transition = isDragging ? 'none' : 'transform 0.3s, opacity 0.3s';
  });
}

function updateCounter() {
  const total = CARDS.length;
  const left = total - currentIdx;
  document.getElementById('counter').textContent = `${currentIdx + 1 > total ? total : currentIdx + 1} / ${total}`;

  // Update dots
  for (let i = 0; i < total; i++) {
    const dot = document.getElementById('dot-' + i);
    if (dot) dot.className = 'dot' + (i < currentIdx ? ' done' : '');
  }
}

function swipeCard(dir, isUpSwipe = false) {
  if (currentIdx >= CARDS.length) return;
  const card = stack[currentIdx];
  
  if (isUpSwipe) {
    // 往上滑：跳轉連結
    const flyY = -600;
    card.style.transition = 'transform 0.4s ease, opacity 0.4s';
    card.style.transform = `translateY(${flyY}px)`;
    card.style.opacity = '0';
    
    // 往上滑時才跳轉連結
    if (card.dataset.link && card.dataset.link !== '#') {
      setTimeout(() => {
        window.open(card.dataset.link, '_blank');
      }, 200);
    }
  } else {
    // 左右滑動
    const flyX = dir * 600;
    card.style.transition = 'transform 0.4s ease, opacity 0.4s';
    card.style.transform = `translateX(${flyX}px) rotate(${dir * 20}deg)`;
    card.style.opacity = '0';

    // 右滑：只將 source 加入陣列並保存，不跳轉連結
    if (dir === 1) {
      const source = card.dataset.source;
      if (source) {
        swipedSources.push(source);
        // 調試：顯示保存的 source
        console.log('右滑保存 source:', source);
        console.log('當前 swipedSources 陣列:', swipedSources);
        saveSwipeToSheets(source);
      }
    }
  }

  currentIdx++;
  setTimeout(() => {
    updateStack();
    updateCounter();
    if (currentIdx >= CARDS.length) showDone();
  }, 300);
}

async function showDone() {
  document.getElementById('card-stack').style.display = 'none';
  document.getElementById('hint-row').style.display = 'none';
  const doneState = document.getElementById('done-state');
  
  // 先重置動畫狀態
  doneState.classList.remove('show');
  doneState.style.display = 'none';
  
  // 動態加載 about.html 的內容
  try {
    const response = await fetch('/about.html');
    const html = await response.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const aboutContent = doc.querySelector('.done-state');
    
    if (aboutContent) {
      // 先替換 done-state 的內容
      doneState.innerHTML = aboutContent.innerHTML;
      
      // 然後從 done-state 中獲取按鈕並設置 onclick 事件
      const replayBtn = doneState.querySelector('.replay-btn');
      if (replayBtn) {
        replayBtn.onclick = replay;
        replayBtn.textContent = '↺ Swipe Again';
      }
    }
  } catch (error) {
    console.error('Failed to load about.html:', error);
    // 如果載入失敗，使用原本的內容
  }
  
  // 獲取所有需要動畫的子元素
  const children = doneState.querySelectorAll('.done-avatar, .done-intro, .done-section, .replay-btn, .done-product-item');
  
  // 手動重置所有子元素的樣式為初始狀態，確保動畫狀態正確
  children.forEach(child => {
    child.style.opacity = '0';
    // 根據元素類型設置不同的初始 transform
    if (child.classList.contains('done-avatar')) {
      child.style.transform = 'scale(0.8) translateY(20px)';
    } else if (child.classList.contains('done-product-item')) {
      child.style.transform = 'translateY(15px)';
    } else {
      child.style.transform = 'translateY(20px)';
    }
    child.style.animation = 'none';
  });
  
  // 強制重排，確保動畫狀態重置
  void doneState.offsetWidth;
  
  // 在下一幀顯示容器
  requestAnimationFrame(() => {
    // 先添加 show 類（此時元素還是 display: none，所以不會顯示）
    doneState.classList.add('show');
    
    // 然後設置 display: flex，此時所有子元素都已經通過內聯樣式設置為隱藏
    doneState.style.display = 'flex';
    
    // 滾動到頂部
    doneState.scrollTop = 0;
    
    // 再等一幀確保 display 已應用，然後清除內聯樣式讓 CSS 動畫接管
    requestAnimationFrame(() => {
      // 再次確保滾動到頂部（防止動畫期間滾動位置改變）
      doneState.scrollTop = 0;
      
      // 清除手動設置的內聯樣式，讓 CSS 動畫規則接管
      // 注意：此時 CSS 規則已經設置了初始狀態（opacity: 0），所以不會閃爍
      children.forEach(child => {
        child.style.opacity = '';
        child.style.transform = '';
        child.style.animation = '';
      });
    });
  });
  
  document.getElementById('counter').textContent = '';
  document.getElementById('dots').innerHTML = '';
  
  // 更新 URL hash，以便重新載入時保持 about me 狀態
  window.location.hash = '#about';
}

// ── DRAG ──
function dragStart(e) {
  if (currentIdx >= CARDS.length) return;
  isDragging = true;
  activeCard = stack[currentIdx];
  const point = e.touches ? e.touches[0] : e;
  startX = point.clientX;
  startY = point.clientY;

  document.addEventListener('mousemove', dragMove);
  document.addEventListener('mouseup', dragEnd);
  document.addEventListener('touchmove', dragMove, { passive: true });
  document.addEventListener('touchend', dragEnd);
}

function dragMove(e) {
  if (!isDragging || !activeCard) return;
  const point = e.touches ? e.touches[0] : e;
  currentX = point.clientX - startX;
  currentY = point.clientY - startY;
  const rot = currentX * 0.08;

  // 檢測主要是水平還是垂直滑動
  const absX = Math.abs(currentX);
  const absY = Math.abs(currentY);
  
  if (absY > absX && absY > 20) {
    // 垂直滑動（往上滑）
    activeCard.style.transition = 'none';
    activeCard.style.transform = `translateY(${currentY}px)`;
  } else {
    // 水平滑動（左右滑）
    activeCard.style.transition = 'none';
    activeCard.style.transform = `translateX(${currentX}px) rotate(${rot}deg)`;
  }

  const idx = parseInt(activeCard.dataset.idx);
  const likeEl = document.getElementById('like-' + idx);
  const nopeEl = document.getElementById('nope-' + idx);
  
  if (absY > absX && absY > 20) {
    // 垂直滑動時不顯示標籤
    likeEl.style.opacity = 0;
    nopeEl.style.opacity = 0;
  } else {
    // 水平滑動時顯示標籤
    const ratio = Math.min(absX / 80, 1);
    if (currentX > 20) {
      likeEl.style.opacity = ratio;
      nopeEl.style.opacity = 0;
    } else if (currentX < -20) {
      nopeEl.style.opacity = ratio;
      likeEl.style.opacity = 0;
    } else {
      likeEl.style.opacity = 0;
      nopeEl.style.opacity = 0;
    }
  }
}

function dragEnd() {
  isDragging = false;
  document.removeEventListener('mousemove', dragMove);
  document.removeEventListener('mouseup', dragEnd);
  document.removeEventListener('touchmove', dragMove);
  document.removeEventListener('touchend', dragEnd);

  if (!activeCard) return;
  const threshold = 100;
  const absX = Math.abs(currentX);
  const absY = Math.abs(currentY);

  // 判斷是垂直滑動還是水平滑動
  if (absY > absX && absY > threshold && currentY < 0) {
    // 往上滑：跳轉連結
    swipeCard(0, true);
  } else if (absX > absY && absX > threshold) {
    // 水平滑動
    if (currentX > threshold) {
      // 右滑：只加入 source 陣列
      swipeCard(1);
    } else if (currentX < -threshold) {
      // 左滑：跳過
      swipeCard(-1);
    } else {
      // snap back
      activeCard.style.transition = 'transform 0.3s spring';
      activeCard.style.transform = 'translateX(0) rotate(0)';
      const idx = parseInt(activeCard.dataset.idx);
      document.getElementById('like-' + idx).style.opacity = 0;
      document.getElementById('nope-' + idx).style.opacity = 0;
    }
  } else {
    // snap back
    activeCard.style.transition = 'transform 0.3s spring';
    activeCard.style.transform = 'translateX(0) rotate(0) translateY(0)';
    const idx = parseInt(activeCard.dataset.idx);
    document.getElementById('like-' + idx).style.opacity = 0;
    document.getElementById('nope-' + idx).style.opacity = 0;
  }

  currentX = 0;
  currentY = 0;
  activeCard = null;
}

// Email input Enter key handling
document.addEventListener('DOMContentLoaded', function() {
  const emailInput = document.getElementById('email-input');
  if (emailInput) {
    emailInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        toggleEmail();
      }
    });
  }
  
  // 確保 Continue 按鈕初始狀態是隱藏的
  const continueBtn = document.getElementById('continue-btn');
  if (continueBtn) {
    continueBtn.style.display = 'none';
  }
  
  // 檢查 URL hash
  if (window.location.hash === '#about') {
    // 先切換到 screen 2
    goTo(2);
    // 然後顯示 about me（跳過所有卡片）
    currentIdx = CARDS.length; // 設置為完成狀態
    setTimeout(() => {
      showDone();
    }, 100);
  } else if (window.location.hash === '#swipe') {
    // 如果有 #swipe hash，直接顯示 swipe 頁面
    goTo(2);
  }
});
